# ClawShell Cloud Hub — Docker Compose

version: "3.8"

services:
  api:
    build: .
    container_name: clawshell-api
    ports:
      - "8000:8000"
    environment:
      - CLAWSHELL_CLOUD_HOST=0.0.0.0
      - CLAWSHELL_CLOUD_PORT=8000
      - CLAWSHELL_DEBUG=false
      - CLAWSHELL_DATA_DIR=/data
      - CLAWSHELL_API_TOKEN=${CLAWSHELL_API_TOKEN:-}
      - CLAWSHELL_MEMOS_API_KEY=${CLAWSHELL_MEMOS_API_KEY:-}
      - CLAWSHELL_MEMOS_USER_ID=${CLAWSHELL_MEMOS_USER_ID:-}
      - CLAWSHELL_ALIYUN_AK_ID=${CLAWSHELL_ALIYUN_AK_ID:-}
      - CLAWSHELL_ALIYUN_AK_SECRET=${CLAWSHELL_ALIYUN_AK_SECRET:-}
      - CLAWSHELL_OSS_ENDPOINT=${CLAWSHELL_OSS_ENDPOINT:-}
      - CLAWSHELL_OSS_BUCKET=${CLAWSHELL_OSS_BUCKET:-clawshell-vault}
      - CLAWSHELL_N8N_URL=http://n8n:5678
    volumes:
      - clawshell_data:/data
    restart: unless-stopped
    networks:
      - clawshell-net

  n8n:
    image: n8nio/n8n:latest
    container_name: clawshell-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - clawshell-net

  nginx:
    image: nginx:alpine
    container_name: clawshell-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - clawshell-net
    depends_on:
      - api

volumes:
  clawshell_data:
  n8n_data:

networks:
  clawshell-net:
    driver: bridge
